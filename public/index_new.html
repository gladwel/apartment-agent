<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Real Estate Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        
        .header h1 { font-size: 1.5rem; }
        
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filters select, .filters input {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #16213e;
            color: #eee;
            font-size: 14px;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-primary { background: #0f3460; color: #fff; }
        .btn-primary:hover { background: #1a4a7a; }
        
        .btn-refresh { background: #e94560; color: #fff; }
        .btn-refresh:hover { background: #ff5a7a; }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #888;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        
        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #0f3460;
        }
        
        .card-image.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #333;
        }
        
        .card-body { padding: 16px; }
        
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .card-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #4ecca3;
            margin-bottom: 8px;
        }
        
        .card-meta {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 12px;
        }
        
        .card-location {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .status-select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #eee;
            font-size: 13px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .status-select[data-status="to_write"] { border-color: #f39c12; color: #f39c12; }
        .status-select[data-status="prohlidka_planned"] { border-color: #3498db; color: #3498db; }
        .status-select[data-status="visited"] { border-color: #2ecc71; color: #2ecc71; }
        
        .notes {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #eee;
            font-size: 13px;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }
        
        .notes:focus { outline: none; border-color: #4ecca3; }
        
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        
        .card-actions .btn {
            flex: 1;
            padding: 6px;
            font-size: 12px;
        }
        
        .btn-view {
            background: #4ecca3;
            color: #1a1a2e;
        }
        
        .btn-save {
            background: #0f3460;
            color: #fff;
        }
        
        .empty {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        @media (max-width: 600px) {
            .header { flex-direction: column; gap: 15px; }
            .filters { width: 100%; }
            .filters select, .filters input { flex: 1; }
        }
    </style>
</head>

        async function loadData() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading">Загрузка данных...</div>';
            
            try {
                // Загружаем JSON из скрейпера
                const response = await fetch('combined_latest.json');
                if (response.ok) {
                    const data = await response.json();
                    // Добавляем ID для трекинга
                    properties = data.map((p, i) => ({...p, id: i}));
                } else {
                    // Пробуем старый файл
                    const response2 = await fetch('byty_latest.json');
                    if (response2.ok) {
                        const data2 = await response2.json();
                        properties = data2.map((p, i) => ({...p, id: i}));
                    } else {
                        properties = demoData;
                    }
                }
            } catch (e) {
                console.log('Using demo data');
                properties = demoData;
            }
            
            render();
        }
        
        function render() {
            const grid = document.getElementById('grid');
            const statusFilter = document.getElementById('filterStatus').value;
            const searchFilter = document.getElementById('searchLocation').value.toLowerCase();
            
            let filtered = properties.filter(p => {
                const saved = savedData[p.id] || {};
                const status = saved.status || '';
                
                if (statusFilter && status !== statusFilter) return false;
                if (searchFilter && !p.location.toLowerCase().includes(searchFilter)) return false;
                
                return true;
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty">Нет объявлений</div>';
                return;
            }
            
            // Статистика
            const stats = { to_write: 0, prohlidka_planned: 0, visited: 0 };
            properties.forEach(p => {
                const s = (savedData[p.id] || {}).status;
                if (s) stats[s]++;
            });
            
            document.getElementById('stats').innerHTML = `
                📝 To Write: ${stats.to_write} | 
                📅 Prohlídka: ${stats.prohlidka_planned} | 
                ✅ Visited: ${stats.visited} | 
                Всего: ${properties.length}
            `;
            
            grid.innerHTML = filtered.map((p, idx) => {
                const id = p.id !== undefined ? p.id : idx;
                const saved = savedData[id] || {};
                const status = saved.status || '';
                const notes = saved.notes || '';
                const imageUrl = p['Фото'] || p['photo'] || p.image || '';
                const name = p['Название'] || p.name || '';
                const price = p['Цена'] || p.price || 0;
                const area = p['Площадь'] || p.area || 0;
                const location = p['Локация'] || p.location || '';
                const url = p['Ссылка'] || p.url || '';
                
                return `
                <div class="card">
                    ${imageUrl 
                        ? `<img class="card-image" src="${imageUrl}" alt="${name}" onerror="this.outerHTML='<div class=\\'card-image placeholder\\'>🏠</div>'">`
                        : `<div class="card-image placeholder">🏠</div>`
                    }
                    <div class="card-body">
                        <div class="card-title">${name}</div>
                        <div class="card-price">${formatPrice(price)} Kč</div>
                        <div class="card-meta">${area} м² • ${area ? (price / area | 0) : 0} Kč/м²</div>
                        <div class="card-location">📍 ${location}</div>
                        
                        <select class="status-select" data-status="${status}" onchange="updateStatus(${id}, this.value)">
                            <option value="">— Статус —</option>
                            <option value="to_write" ${status === 'to_write' ? 'selected' : ''}>📝 To Write</option>
                            <option value="prohlidka_planned" ${status === 'prohlidka_planned' ? 'selected' : ''}>📅 Prohlídka Planned</option>
                            <option value="visited" ${status === 'visited' ? 'selected' : ''}>✅ Visited</option>
                        </select>
                        
                        <textarea class="notes" placeholder="Заметки..." onchange="updateNotes(${id}, this.value)">${notes}</textarea>
                        
                        <div class="card-actions">
                            <a href="${url}" target="_blank" class="btn btn-view">👁 Смотреть</a>
                            <button class="btn btn-save" onclick="saveData()">💾 Сохранить</button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }
        
        function formatPrice(price) {
            if (!price) return 'Договорная';
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }
        
        function updateStatus(id, status) {
            if (!savedData[id]) savedData[id] = {};
            savedData[id].status = status;
            
            const select = document.querySelector(`.status-select[onchange*="${id},"]`);
            if (select) select.setAttribute('data-status', status);
            
            updateStats();
        }
        
        function updateNotes(id, notes) {
            if (!savedData[id]) savedData[id] = {};
            savedData[id].notes = notes;
        }
        
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));
            alert('✅ Сохранено в браузере!');
        }
        
        function updateStats() {
            const stats = { to_write: 0, prohlidka_planned: 0, visited: 0 };
            properties.forEach(p => {
                const s = (savedData[p.id] || {}).status;
                if (s) stats[s]++;
            });
            
            document.getElementById('stats').innerHTML = `
                📝 To Write: ${stats.to_write} | 
                📅 Prohlídka: ${stats.prohlidka_planned} | 
                ✅ Visited: ${stats.visited} | 
                Всего: ${properties.length}
            `;
        }
        
        // Фильтры
        document.getElementById('filterStatus').addEventListener('change', render);
        document.getElementById('searchLocation').addEventListener('input', render);
        
        // Загрузка при старте
        loadData();
    </script>
