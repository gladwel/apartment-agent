<html lang="cs">
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Аренда Прага</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #fff; height: 100vh; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #16213e; flex-wrap: wrap; gap: 10px; }
        .header h1 { font-size: 1.1rem; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .refresh-btn { padding: 6px 10px; background: #4ecca3; color: #000; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .district-btns { display: flex; gap: 4px; flex-wrap: wrap; }
        .district-btn { padding: 4px 8px; background: #0f3460; color: #888; border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .district-btn.active { background: #4ecca3; color: #000; border-color: #4ecca3; }
        .count { color: #aaa; font-size: 0.85rem; }
        
        .main { display: flex; height: calc(100vh - 60px); }
        .left-panel { width: 55%; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .right-panel { width: 45%; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 12px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .card { border-radius: 10px; overflow: hidden; position: relative; height: 160px; background: #16213e; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
        .card:hover { transform: scale(1.02); }
        .card.selected { box-shadow: 0 0 0 3px #4ecca3; }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100px; object-fit: cover; }
        .card-img-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .card-link { position: absolute; top: 0; left: 0; width: 100%; height: 100px; }
        .card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .card-price { font-size: 1rem; font-weight: 700; color: #4ecca3; }
        .card-meta { font-size: 0.7rem; color: #ddd; }
        .card-location { font-size: 0.65rem; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .source-badge { position: absolute; top: 6px; right: 6px; padding: 2px 5px; border-radius: 3px; font-size: 8px; font-weight: 600; }
        .source-sreality { background: #0f3460; }
        .source-bezier { background: #e94560; }
        .view-btn { display: block; margin-top: 6px; padding: 4px 8px; background: #4ecca3; color: #000; text-align: center; border-radius: 4px; text-decoration: none; font-size: 0.75rem; font-weight: 600; }
        .view-btn:hover { background: #3db892; }
        
        #map { height: 100%; }
        
        .leaflet-popup-content-wrapper { background: #16213e; color: #fff; }
        .leaflet-popup-tip { background: #16213e; }
        .leaflet-popup-content { margin: 10px; }
    </style>
</head>

    <div class="header">
        <h1>🏠 Аренда Прага</h1>
        <div class="header-right">
            <div class="district-btns">
                <button class="district-btn active" data-district="all" onclick="toggleDistrict('all', this)">Все</button>
                <button class="district-btn" data-district="Praha 1" onclick="toggleDistrict('Praha 1', this)">П1</button>
                <button class="district-btn" data-district="Praha 2" onclick="toggleDistrict('Praha 2', this)">П2</button>

                <button class="district-btn" data-district="Praha 10" onclick="toggleDistrict('Praha 10', this)">П10</button>
            </div>
            <span class="count" id="count">0 кв.</span>
            <button class="refresh-btn" onclick="refreshAll()">🔄</button>
        </div>
    </div>
    
    <div class="main">
        <div class="left-panel">
            <div class="list-container">
                <div class="grid" id="grid"></div>

        <div class="right-panel">
            <div id="map"></div>
        </div>
    </div>

19000, "Площадь": 32, "Локация": "Františka Jansy, Praha - Dolní Měcholupy", "Источник": "Bezrealitky", "Ссылка": "https://www.bezrealitky.cz/nemovitosti-byty-domy/797202-nabidka-pronajem-bytu-frantiska-jansy-praha", "Фото": "", "Дата": "2026-03-06 04:42", "_id": "apt-128"}];
    let map, markers = [];
    let selectedDistricts = [];
    let selectedCardId = null;
    
    const pragueCoords = {
        'Praha 1': [50.0875, 14.4215], 'Praha 2': [50.0775, 14.4480], 'Praha 3': [50.0830, 14.4750],
        'Praha 4': [50.0500, 14.4400], 'Praha 5': [50.0550, 14.4100], 'Praha 6': [50.1000, 14.3900],
        'Praha 7': [50.0950, 14.4250], 'Praha 8': [50.1100, 14.4500], 'Praha 9': [50.1200, 14.4800], 'Praha 10': [50.0750, 14.5000],
    };
    
    const areaToDistrict = {
        'Smíchov': 'Praha 5', 'Košíře': 'Praha 5', 'Radlice': 'Praha 5', 'Zbraslav': 'Praha 5', 'Modřany': 'Praha 4',
        'Vinohrady': 'Praha 2', 'Vršovice': 'Praha 10', 'Nusle': 'Praha 4', 'Michle': 'Praha 4', 'Chodov': 'Praha 4',
        'Hloubětín': 'Praha 9', 'Černý Most': 'Praha 9', 'Kbely': 'Praha 9', 'Letňany': 'Praha 9',
        'Vysočany': 'Praha 9', 'Žižkov': 'Praha 3',
        'Staré Město': 'Praha 1', 'Nové Město': 'Praha 1',
        'Vokovice': 'Praha 6', 'Dejvice': 'Praha 6', 'Bubeneč': 'Praha 6',
        'Holešovice': 'Praha 7', 'Karlín': 'Praha 8', 'Libeň': 'Praha 8',
        'Hostivař': 'Praha 10', 'Strašnice': 'Praha 10',
        'Krč': 'Praha 4', 'Lhotka': 'Praha 4', 'Libuš': 'Praha 4',
        'Záběhlice': 'Praha 10', 'Stodůlky': 'Praha 5', 'Dolní Měcholupy': 'Praha 10', 'Kobylisy': 'Praha 8',
    };
    
    function getHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return Math.abs(hash);
    }
    
    function getDistrict(loc) {
        if (!loc) return null;
        for (let i = 1; i <= 10; i++) {
            if (loc.includes('Praha ' + i) || loc.includes('Praha-' + i)) return 'Praha ' + i;
        }
        const parts = loc.split(' - ');
        if (parts.length > 1) {
            const area = parts[parts.length - 1].trim();
            if (areaToDistrict[area]) return areaToDistrict[area];
        }
        return null;
    }
    
    function getCoords(loc, gps) {
        // Использовать реальные GPS если есть
        if (gps && gps.lat && gps.lng) {
            return [gps.lat, gps.lng];
        }
        const d = getDistrict(loc) || 'Praha 1';
        const base = pragueCoords[d] || [50.0875, 14.4215];
        const hash = getHash(loc);
        const angle = (hash % 360) * (Math.PI / 180);
        const radius = 0.008 + ((hash % 20) / 1000);
        return [base[0] + Math.sin(angle) * radius, base[1] + Math.cos(angle) * radius];
    }
    
    // Маппинг названий районов к номерам Праги
    const DISTRICT_MAP = {
        'Praha 1': ['Nové Město', 'Staré Město', 'Malá Strana', 'Hradčany', 'Josefov', 'Vyšehrad', 'Vinohrady'],
        'Praha 2': ['Vinohrady', 'Nusle', 'Vyšehrad', 'Nové Město'],
        'Praha 3': ['Žižkov', 'Vinohrady', 'Strašnice'],
        'Praha 4': ['Braník', 'Modřany', 'Krč', 'Kunratice', 'Chodov', 'Háje', 'Michle', 'Lhotka'],
        'Praha 5': ['Košíře', 'Smíchov', 'Hlubočepy', 'Barrandov', 'Radlice', 'Zličín'],
        'Praha 6': ['Břevnov', 'Dejvice', 'Bubeneč', 'Hanspaulka', 'Střešovice', 'Veleslavín', 'Ruzyně'],
        'Praha 7': ['Holešovice', 'Bubny', 'Letná', 'Holešovice'],
        'Praha 8': ['Karlín', 'Libeň', 'Vysočany', 'Bohunice', 'Černý Most'],
        'Praha 9': ['Prosek', 'Vysočany', 'Hloubětín', 'Kobylisy', 'Střížkov'],
        'Praha 10': ['Vršovice', 'Strašnice', 'Hostivař', 'Malešice', 'Záběhlice']
    };

    function matchesDistrict(location) {
        if (!location) return false;
        location = location.toLowerCase();
        for (const [prahaNum, districts] of Object.entries(DISTRICT_MAP)) {
            for (const d of districts) {
                if (location.includes(d.toLowerCase())) return prahaNum;
            }
        }
        for (let i = 1; i <= 10; i++) {
            if (location.includes(`praha ${i}`) || location.includes(`praha${i}`)) return `Praha ${i}`;
        }
        return null;
    }

    function toggleDistrict(district, btn) {
        if (district === 'all') {
            selectedDistricts = [];
            document.querySelectorAll('.district-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        } else {
            document.querySelector('[data-district="all"]').classList.remove('active');
            if (selectedDistricts.includes(district)) {
                selectedDistricts = selectedDistricts.filter(d => d !== district);
                btn.classList.remove('active');
            } else {
                selectedDistricts.push(district);
                btn.classList.add('active');
            }
            if (selectedDistricts.length === 0) document.querySelector('[data-district="all"]').classList.add('active');
        }
        render();
        renderMarkers();
    }
    
    // Выбрать квартиру - подсветить на карте и в списке
    function selectCard(id) {
        selectedCardId = id;
        
        // Подсветка карточки
        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        const cardEl = document.getElementById('card-' + id);
        if (cardEl) {
            cardEl.classList.add('selected');
            cardEl.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
        
        // Зум к маркеру и открыть попап
        const prop = allProperties.find(p => p._id === id);
        if (prop && map) {
            const coord = getCoords(prop['Локация'], prop['GPS']);
            map.setView(coord, 15);
            const markerIdx = markers.findIndex(m => m._id === id);
            if (markerIdx >= 0 && markers[markerIdx]) {
                markers[markerIdx].openPopup();
            }
        }
    }
    
    // Клик по маркеру - подсветить карточку
    function onMarkerClick(id) {
        selectCard(id);
    }
    
    function renderMarkers() {
        if (!map) return;
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        
        let props = selectedDistricts.length > 0 ? allProperties.filter(p => selectedDistricts.some(d => matchesDistrict(p['Локация']) === d)) : allProperties;
        
        props.forEach((p, idx) => {
            const coord = getCoords(p['Локация'], p['GPS']);
            const isSelected = p._id === selectedCardId;
            const iconHtml = isSelected 
                ? '<div style="background:#4ecca3;width:24px;height:24px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>'
                : '<div style="background:#e94560;width:16px;height:16px;border-radius:50%;border:2px solid #fff"></div>';
            const icon = L.divIcon({html: iconHtml, className: 'custom-marker', iconSize: [24, 24], iconAnchor: [12, 12]});
            
            const popupContent = '<div style="min-width:180px"><div style="font-size:1.1em;font-weight:700;color:#4ecca3">' + parseInt(p['Цена']||0).toLocaleString() + ' Kč</div><div style="font-size:0.85em;color:#aaa">' + (p['Площадь']||0) + ' м²</div><div style="font-size:0.8em;margin-top:4px">' + (p['Локация']||'') + '</div><a href="' + (p['Ссылка']||'#') + '" target="_blank" style="display:block;margin-top:8px;padding:6px;background:#4ecca3;color:#000;text-align:center;border-radius:4px;text-decoration:none;font-size:0.8em">Смотреть</a></div>';
            
            const marker = L.marker(coord, {icon: icon}).addTo(map).bindPopup(popupContent);
            marker._id = p._id;
            marker.on('click', () => onMarkerClick(p._id));
            markers.push(marker);
        });
        
        if (markers.length > 0) {
            map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
        }
    }
    
    function render() {
        let props = selectedDistricts.length > 0 ? allProperties.filter(p => selectedDistricts.some(d => matchesDistrict(p['Локация']) === d)) : allProperties;
        
        document.getElementById('grid').innerHTML = props.map((p, idx) => {
            const photo = p['Фото'] || '';
            const badge = p['Источник'] === 'SReality' ? 'source-sreality' : 'source-bezier';
            const img = photo 
                ? '<img class="card-img" src="' + photo + '">' 
                : '<div class="card-img-placeholder">🏠</div>';
            const link = p['Ссылка'] || '#';
            const isSelected = p._id === selectedCardId ? 'selected' : '';
            return '<div id="card-' + p._id + '" class="card ' + isSelected + '" onclick="selectCard(\'' + p._id + '\')">' + img + '<span class="source-badge ' + badge + '">' + p['Источник'] + '</span><div class="card-body"><div class="card-price">' + parseInt(p['Цена']||0).toLocaleString() + ' Kč</div><div class="card-meta">' + (p['Площадь']||0) + ' м²</div><div class="card-location">📍 ' + (p['Локация']||'').slice(0,40) + '</div><a href="' + link + '" target="_blank" class="view-btn">Смотреть</a></div></div>';
        }).join('');
        
        document.getElementById('count').textContent = props.length + ' кв.';
    }
    
    async function refreshAll() {
        try { 
            const resp = await fetch('combined_latest.json'); 
            const data = await resp.json(); 
            // Assign unique IDs
            data.forEach((p, i) => p._id = 'apt-' + i);
            allProperties = data.filter(p => p['Цена'] && p['Цена'] <= 40000 && p['Локация'].toLowerCase().includes('praha')).sort((a,b) => a['Цена'] - b['Цена']); 
        } catch(e) { console.error(e); }
        render();
        renderMarkers();
    }
    
    // Инициализация карты
    document.addEventListener('DOMContentLoaded', () => {
        map = L.map('map').setView([50.0875, 14.4215], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '© OSM'}).addTo(map);
        setTimeout(() => {
            refreshAll();
            // Авто-выбор первой квартиры
            setTimeout(() => {
                if (allProperties.length > 0) {
                    selectCard(allProperties[0]._id);
                }
            }, 500);
        }, 100);
    });
    </script>
