    <style>

        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #1a1a2e; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 1.2rem; }
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .refresh-btn { padding: 8px 12px; background: #4ecca3; color: #000; border: none; border-radius: 6px; cursor: pointer; }
        .district-btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .district-btn { padding: 6px 12px; background: #16213e; color: #888; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .district-btn.active { background: #4ecca3; color: #000; border-color: #4ecca3; }
        .tabs { display: flex; background: #1a1a2e; padding: 0 16px; gap: 8px; }
        .tab { padding: 10px 16px; background: transparent; color: #888; border: none; cursor: pointer; }
        .tab.active { color: #4ecca3; border-bottom: 2px solid #4ecca3; }
        .content { display: none; }
        .content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
        #map { height: calc(100vh - 160px); }
        .card { border-radius: 12px; overflow: hidden; position: relative; height: 200px; background: #1a1a2e; }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-link { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .card-price { font-size: 1.1rem; font-weight: 700; color: #4ecca3; }
        .card-meta { font-size: 0.75rem; color: #ddd; }
        .card-location { font-size: 0.7rem; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .source-badge { position: absolute; top: 8px; right: 8px; padding: 3px 6px; border-radius: 4px; font-size: 9px; font-weight: 600; }
        .source-sreality { background: #0f3460; }
        .source-bezier { background: #e94560; }
    </style>

        'Hloubětín': 'Praha 9', 'Černý Most': 'Praha 9', 'Kbely': 'Praha 9', 'Letňany': 'Praha 9',
        'Vysočany': 'Praha 9', 'Žižkov': 'Praha 3',
        'Staré Město': 'Praha 1', 'Nové Město': 'Praha 1',
        'Vokovice': 'Praha 6', 'Dejvice': 'Praha 6', 'Bubeneč': 'Praha 6',
        'Holešovice': 'Praha 7', 'Karlín': 'Praha 8', 'Libeň': 'Praha 8',
        'Hostivař': 'Praha 10', 'Strašnice': 'Praha 10',
        'Krč': 'Praha 4', 'Lhotka': 'Praha 4', 'Libuš': 'Praha 4',
        'Záběhlice': 'Praha 10', 'Stodůlky': 'Praha 5', 'Dolní Měcholupy': 'Praha 10', 'Kobylisy': 'Praha 8',
    };
    
    function getHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return Math.abs(hash);
    }
    
    function getDistrict(loc) {
        if (!loc) return null;
        for (let i = 1; i <= 10; i++) {
            if (loc.includes('Praha ' + i) || loc.includes('Praha-' + i)) return 'Praha ' + i;
        }
        const parts = loc.split(' - ');
        if (parts.length > 1) {
            const area = parts[parts.length - 1].trim();
            if (areaToDistrict[area]) return areaToDistrict[area];
        }
        return null;
    }
    
    function getCoords(loc) {
        const d = getDistrict(loc) || 'Praha 1';
        const base = pragueCoords[d] || [50.0875, 14.4215];
        const hash = getHash(loc);
        const angle = (hash % 360) * (Math.PI / 180);
        const radius = 0.008 + ((hash % 20) / 1000);
        return [base[0] + Math.sin(angle) * radius, base[1] + Math.cos(angle) * radius];
    }
    
    function showTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tab).classList.add('active');
        if (tab === 'map' && !map) {
            map = L.map('map').setView([50.0875, 14.4215], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '© OSM'}).addTo(map);
            setTimeout(renderMarkers, 100);
        }
    }
    
    // Маппинг названий районов к номерам Праги
    const DISTRICT_MAP = {
        'Praha 1': ['Nové Město', 'Staré Město', 'Malá Strana', 'Hradčany', 'Josefov', 'Vyšehrad', 'Vinohrady'],
        'Praha 2': ['Vinohrady', 'Nusle', 'Vyšehrad', 'Nové Město'],
        'Praha 3': ['Žižkov', 'Vinohrady', 'Strašnice'],
        'Praha 4': ['Braník', 'Modřany', 'Krč', 'Kunratice', 'Chodov', 'Háje', 'Michle', 'Lhotka'],
        'Praha 5': ['Košíře', 'Smíchov', 'Hlubočepy', 'Barrandov', 'Radlice', 'Zličín'],
        'Praha 6': ['Břevnov', 'Dejvice', 'Bubeneč', 'Hanspaulka', 'Střešovice', 'Veleslavín', 'Ruzyně'],
        'Praha 7': ['Holešovice', 'Bubny', 'Letná', 'Holešovice'],
        'Praha 8': ['Karlín', 'Libeň', 'Vysočany', 'Bohunice', 'Černý Most'],
        'Praha 9': ['Prosek', 'Vysočany', 'Hloubětín', 'Kobylisy', 'Střížkov'],
        'Praha 10': ['Vršovice', 'Strašnice', 'Hostivař', 'Malešice', 'Záběhlice']
    };

    function matchesDistrict(location) {
        if (!location) return false;
        location = location.toLowerCase();
        for (const [prahaNum, districts] of Object.entries(DISTRICT_MAP)) {
            for (const d of districts) {
                if (location.includes(d.toLowerCase())) return prahaNum;
            }
        }
        // Прямое совпадение Praha N
        for (let i = 1; i <= 10; i++) {
            if (location.includes(`praha ${i}`) || location.includes(`praha${i}`)) return `Praha ${i}`;
        }
        return null;
    }

    function toggleDistrict(district, btn) {
        if (district === 'all') {
            selectedDistricts = [];
            document.querySelectorAll('.district-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        } else {
            document.querySelector('[data-district="all"]').classList.remove('active');
            if (selectedDistricts.includes(district)) {
                selectedDistricts = selectedDistricts.filter(d => d !== district);
                btn.classList.remove('active');
            } else {
                selectedDistricts.push(district);
                btn.classList.add('active');
            }
            if (selectedDistricts.length === 0) document.querySelector('[data-district="all"]').classList.add('active');
        }
        render();
        if (map) renderMarkers();
    }
    
    function renderMarkers() {
        if (!map) return;
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        let props = selectedDistricts.length > 0 ? allProperties.filter(p => selectedDistricts.some(d => matchesDistrict(p['Локация']) === d)) : allProperties;
        props.forEach(p => {
            const coord = getCoords(p['Локация']);
            const popupContent = '<div style="min-width:180px"><div style="font-size:1.1em;font-weight:700;color:#4ecca3">' + parseInt(p['Цена']||0).toLocaleString() + ' Kč</div><div style="font-size:0.85em;color:#aaa">' + (p['Площадь']||0) + ' м²</div><div style="font-size:0.8em;margin-top:4px">' + (p['Локация']||'') + '</div><a href="' + (p['Ссылка']||'#') + '" target="_blank" style="display:block;margin-top:8px;padding:6px;background:#4ecca3;color:#000;text-align:center;border-radius:4px;text-decoration:none;font-size:0.8em">Смотреть</a></div>';
            markers.push(L.marker(coord).addTo(map).bindPopup(popupContent));
        });
        if (markers.length > 0) { map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1)); }
    }
    
    function render() {
        let props = selectedDistricts.length > 0 ? allProperties.filter(p => selectedDistricts.some(d => matchesDistrict(p['Локация']) === d)) : allProperties;
        document.getElementById('grid').innerHTML = props.slice(0,40).map(p => {
            const photo = p['Фото'] || '';
            const badge = p['Источник'] === 'SReality' ? 'source-sreality' : 'source-bezier';
            const img = photo ? '<img class="card-img" src="' + photo + '">' : '<div class="card-img" style="background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:2rem">🏠</div>';
            const link = p['Ссылка'] || '#';
            return '<div class="card">' + img + '<a href="' + link + '" target="_blank" class="card-link"></a><span class="source-badge ' + badge + '">' + p['Источник'] + '</span><div class="card-body"><div class="card-price">' + parseInt(p['Цена']||0).toLocaleString() + ' Kč</div><div class="card-meta">' + (p['Площадь']||0) + ' м²</div><div class="card-location">📍 ' + (p['Локация']||'').slice(0,50) + '</div></div></div>';
        }).join('');
        document.getElementById('count').textContent = props.length + ' кв.';
    }
    
    async function refreshAll() {
        try { const resp = await fetch('combined_latest.json'); const data = await resp.json(); allProperties = data.filter(p => p['Цена'] && p['Цена'] <= 40000 && p['Локация'].toLowerCase().includes('praha')).sort((a,b) => a['Цена'] - b['Цена']); } catch(e) {}
        render();
        if (map) renderMarkers();
    }
    
    render();
    </script>
</body>
</html>
